<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html {
  scroll-behavior: smooth;
  font-size: 16px;
}
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #0a1628;
  color: #e0e6ef;
  line-height: 1.8;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
a {
  color: inherit;
  text-decoration: none;
  transition: color 0.3s ease;
}
ul { list-style: none; }
img { max-width: 100%; height: auto; display: block; }

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 1000;
  padding: 0 40px;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background 0.4s ease, box-shadow 0.4s ease;
  background: transparent;
}
.header.scrolled {
  background: rgba(10, 22, 40, 0.95);
  box-shadow: 0 2px 30px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.header-logo img {
  height: 45px;
  width: auto;
  transition: opacity 0.3s ease;
}
.header-logo:hover img {
  opacity: 0.8;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
}
.header-twitter img {
  width: 28px;
  height: 28px;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.header-twitter:hover img {
  transform: scale(1.15);
  opacity: 0.8;
}

/* Hamburger */
.hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 44px;
  height: 44px;
  cursor: pointer;
  z-index: 1100;
  background: none;
  border: none;
  padding: 0;
}
.hamburger span {
  display: block;
  width: 26px;
  height: 2px;
  background: #fff;
  transition: transform 0.35s ease, opacity 0.35s ease;
  margin: 4px 0;
  border-radius: 2px;
}
.hamburger.active span:nth-child(1) {
  transform: translateY(10px) rotate(45deg);
}
.hamburger.active span:nth-child(2) {
  opacity: 0;
}
.hamburger.active span:nth-child(3) {
  transform: translateY(-10px) rotate(-45deg);
}

/* Mobile Slide Menu */
.mobile-nav {
  position: fixed;
  top: 0;
  right: -320px;
  width: 320px;
  max-width: 85vw;
  height: 100vh;
  background: rgba(10, 22, 40, 0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1050;
  transition: right 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  padding: 100px 40px 40px;
  overflow-y: auto;
  border-left: 1px solid rgba(0, 168, 255, 0.15);
}
.mobile-nav.open {
  right: 0;
}
.mobile-nav a {
  display: block;
  padding: 14px 0;
  font-size: 0.95rem;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: #c0cfe0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  transition: color 0.3s ease, padding-left 0.3s ease;
}
.mobile-nav a:hover {
  color: #00a8ff;
  padding-left: 8px;
}
.mobile-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1040;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
.mobile-overlay.show {
  opacity: 1;
  visibility: visible;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 600px;
  overflow: hidden;
}
.hero-slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1.2s ease-in-out;
  will-change: opacity;
}
.hero-slide.active {
  opacity: 1;
}
.hero-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1.05);
  animation: heroZoom 8s ease-in-out infinite alternate;
}
@keyframes heroZoom {
  0% { transform: scale(1.05); }
  100% { transform: scale(1.12); }
}
.hero-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    180deg,
    rgba(10, 22, 40, 0.3) 0%,
    rgba(10, 22, 40, 0.1) 40%,
    rgba(10, 22, 40, 0.6) 75%,
    rgba(10, 22, 40, 0.95) 100%
  );
  z-index: 2;
}
.hero-content {
  position: absolute;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 3;
  width: 90%;
}
.hero-tagline {
  font-size: clamp(1.2rem, 3vw, 2.2rem);
  font-weight: 300;
  letter-spacing: 0.25em;
  color: #fff;
  text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
}
.hero-tagline span {
  display: inline-block;
  border-bottom: 1px solid rgba(0, 168, 255, 0.6);
  padding-bottom: 8px;
}
.hero-indicators {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 3;
}
.hero-indicators button {
  width: 40px;
  height: 3px;
  border: none;
  background: rgba(255, 255, 255, 0.3);
  cursor: pointer;
  transition: background 0.3s ease, width 0.3s ease;
  border-radius: 2px;
  padding: 0;
}
.hero-indicators button.active {
  background: #00a8ff;
  width: 56px;
}
.hero-scroll-hint {
  position: absolute;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  animation: scrollBounce 2s infinite;
}
.hero-scroll-hint::after {
  content: '';
  display: block;
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, #00a8ff, transparent);
  margin: 0 auto;
}
@keyframes scrollBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}

/* ===== SECTION COMMON ===== */
.section {
  padding: 100px 0;
  position: relative;
}
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}
.section-title {
  text-align: center;
  margin-bottom: 60px;
}
.section-title img {
  margin: 0 auto;
  max-height: 36px;
}

/* ===== MENU SECTION ===== */
.menu-section {
  background: linear-gradient(180deg, #0a1628 0%, #0e1e35 100%);
}
.menu-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 20px;
}
.menu-card {
  position: relative;
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 3 / 4;
  display: block;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  border: 1px solid rgba(255, 255, 255, 0.1);
}
.menu-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 24px 60px rgba(0, 168, 255, 0.2), 0 0 0 1px rgba(0, 168, 255, 0.3);
}
.menu-card-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
.menu-card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}
.menu-card:hover .menu-card-img img {
  transform: scale(1.08);
}
.menu-card-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, transparent 30%, rgba(0, 0, 0, 0.8) 100%);
  z-index: 2;
  transition: background 0.4s ease;
}
.menu-card:hover .menu-card-overlay {
  background: linear-gradient(to bottom, transparent 30%, rgba(0, 0, 0, 0.6) 100%);
}
.menu-card-body {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 24px 18px;
  z-index: 3;
  text-align: left;
}
.menu-card-body h3 {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #fff;
  margin-bottom: 4px;
  transition: color 0.3s ease;
}
.menu-card:hover .menu-card-body h3 {
  color: #00a8ff;
}
.menu-card-body .menu-card-sub {
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: rgba(255, 255, 255, 0.5);
  text-transform: uppercase;
  transition: color 0.3s ease;
}
.menu-card:hover .menu-card-body .menu-card-sub {
  color: rgba(0, 168, 255, 0.7);
}

/* ===== NEWS SECTION ===== */
.news-section {
  background: #0a1628;
  position: relative;
}
.news-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  max-width: 600px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(0, 168, 255, 0.3), transparent);
}
.news-timeline {
  max-width: 700px;
  margin: 0 auto;
  position: relative;
  padding-left: 40px;
}
.news-timeline::before {
  content: '';
  position: absolute;
  top: 0;
  left: 14px;
  width: 2px;
  height: 100%;
  background: linear-gradient(to bottom, #00a8ff, rgba(0, 168, 255, 0.1));
  border-radius: 1px;
}
.news-item {
  position: relative;
  padding: 0 0 40px 30px;
}
.news-item:last-child {
  padding-bottom: 0;
}
.news-item::before {
  content: '';
  position: absolute;
  left: -33px;
  top: 6px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #0a1628;
  border: 2px solid #00a8ff;
  box-shadow: 0 0 12px rgba(0, 168, 255, 0.4);
  transition: background 0.3s ease, box-shadow 0.3s ease;
}
.news-item:hover::before {
  background: #00a8ff;
  box-shadow: 0 0 20px rgba(0, 168, 255, 0.7);
}
.news-date {
  font-size: 0.8rem;
  color: #00a8ff;
  font-weight: 500;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}
.news-text {
  font-size: 0.95rem;
  color: #a0b0c8;
  transition: color 0.3s ease;
}
.news-item:hover .news-text {
  color: #e0e6ef;
}

/* ===== FOOTER ===== */
.footer {

  border-top: 1px solid rgba(255, 255, 255, 0.05);

.footer-inner {

.footer-logo:hover img {

}
.footer-address {

  font-size: 0.85rem;
  color: #6a7d96;
  letter-spacing: 0.05em;
  line-height: 2;
}
.footer-twitter {
  display: inline-block;
  transition: transform 0.3s ease, opacity 0.3s ease;
}
.footer-twitter img {
  width: 30px;
  height: 30px;
}
.footer-twitter:hover {
  transform: scale(1.15);
  opacity: 0.8;
}
.footer-copyright {
  font-size: 0.75rem;
  color: #3a4d66;
  letter-spacing: 0.08em;
  margin-top: 20px;
  text-align: center;
}

/* ===== SCROLL ANIMATIONS ===== */
.fade-in {
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}
.fade-in-delay-1 { transition-delay: 0.1s; }
.fade-in-delay-2 { transition-delay: 0.2s; }
.fade-in-delay-3 { transition-delay: 0.3s; }
.fade-in-delay-4 { transition-delay: 0.4s; }
.fade-in-delay-5 { transition-delay: 0.5s; }

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
  .menu-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;

  .header { padding: 0 24px; }
}

@media (max-width: 768px) {
  .hamburger { display: flex; }
  .header-twitter { display: none; }
  .header { padding: 0 16px; height: 64px; }
  .header-logo img { height: 36px; }
  .hero { min-height: 500px; }
  .hero-content { bottom: 20%; }

    grid-template-columns: repeat(2, 1fr);

  }
  .menu-card-body { padding: 18px 14px; }
  .menu-card-body h3 { font-size: 0.95rem; }
  .section-title { margin-bottom: 40px; }
}

@media (max-width: 480px) {

    margin: 0 auto;
  }

  .news-item { padding-left: 24px; }
  .container { padding: 0 16px; }
  .footer-address { font-size: 0.8rem; }
}
</style>

<script>
/* ===== STICKY HEADER ===== */
(function() {
  var header = document.getElementById('header');
  var scrollThreshold = 80;
  window.addEventListener('scroll', function() {
    if (window.scrollY > scrollThreshold) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  }, { passive: true });
})();

/* ===== HAMBURGER MENU ===== */
(function() {
  var hamburger = document.getElementById('hamburger');
  var mobileNav = document.getElementById('mobileNav');
  var overlay = document.getElementById('mobileOverlay');

  function toggleMenu() {
    hamburger.classList.toggle('active');
    mobileNav.classList.toggle('open');
    overlay.classList.toggle('show');
    document.body.style.overflow = mobileNav.classList.contains('open') ? 'hidden' : '';
  }
  function closeMenu() {
    hamburger.classList.remove('active');
    mobileNav.classList.remove('open');
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  hamburger.addEventListener('click', toggleMenu);
  overlay.addEventListener('click', closeMenu);

  var navLinks = mobileNav.querySelectorAll('a');
  navLinks.forEach(function(link) {
    link.addEventListener('click', closeMenu);
  });
})();

/* ===== HERO SLIDESHOW ===== */
(function() {
  var slides = document.querySelectorAll('.hero-slide');
  var indicators = document.querySelectorAll('.hero-indicators button');
  var current = 0;
  var total = slides.length;
  var interval = 5000;
  var timer;

  function goTo(index) {
    slides[current].classList.remove('active');
    indicators[current].classList.remove('active');
    current = index;
    slides[current].classList.add('active');
    indicators[current].classList.add('active');
  }

  function next() {
    goTo((current + 1) % total);
  }

  function startTimer() {
    timer = setInterval(next, interval);
  }
  function resetTimer() {
    clearInterval(timer);
    startTimer();
  }

  indicators.forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.getAttribute('data-slide'));
      if (idx !== current) {
        goTo(idx);
        resetTimer();
      }
    });
  });

  startTimer();
})();

/* ===== SCROLL ANIMATIONS ===== */
(function() {
  var elements = document.querySelectorAll('.fade-in');
  if (!elements.length) return;

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, {
    threshold: 0.15,
    rootMargin: '0px 0px -40px 0px'
  });

  elements.forEach(function(el) {
    observer.observe(el);
  });
})();
</script>
</body>
