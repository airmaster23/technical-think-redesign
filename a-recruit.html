<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body { font-family: 'Noto Sans JP', sans-serif; background: #0a1628; color: #e0e6ef; line-height: 1.8; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; transition: color 0.3s ease; }
ul { list-style: none; }
img { max-width: 100%; height: auto; display: block; }

.header { position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; padding: 0 40px; height: 80px; display: flex; align-items: center; justify-content: space-between; transition: background 0.4s ease, box-shadow 0.4s ease; background: transparent; }
.header.scrolled { background: rgba(10,22,40,0.95); box-shadow: 0 2px 30px rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
.header-logo img { height: 45px; width: auto; transition: opacity 0.3s ease; }
.header-logo:hover img { opacity: 0.8; }
.header-right { display: flex; align-items: center; gap: 20px; }
.header-twitter img { width: 28px; height: 28px; transition: transform 0.3s ease, opacity 0.3s ease; }
.header-twitter:hover img { transform: scale(1.15); opacity: 0.8; }
.hamburger { display: none; flex-direction: column; justify-content: center; align-items: center; width: 44px; height: 44px; cursor: pointer; z-index: 1100; background: none; border: none; padding: 0; }
.hamburger span { display: block; width: 26px; height: 2px; background: #fff; transition: transform 0.35s ease, opacity 0.35s ease; margin: 4px 0; border-radius: 2px; }
.hamburger.active span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }
.mobile-nav { position: fixed; top: 0; right: -320px; width: 320px; max-width: 85vw; height: 100vh; background: rgba(10,22,40,0.97); backdrop-filter: blur(20px); z-index: 1050; transition: right 0.4s cubic-bezier(0.22,1,0.36,1); padding: 100px 40px 40px; overflow-y: auto; border-left: 1px solid rgba(0,168,255,0.15); }
.mobile-nav.open { right: 0; }
.mobile-nav a { display: block; padding: 14px 0; font-size: 0.95rem; font-weight: 400; letter-spacing: 0.05em; color: #c0cfe0; border-bottom: 1px solid rgba(255,255,255,0.06); transition: color 0.3s ease, padding-left 0.3s ease; }
.mobile-nav a:hover { color: #00a8ff; padding-left: 8px; }
.mobile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1040; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease; }
.mobile-overlay.show { opacity: 1; visibility: visible; }

.page-hero { position: relative; width: 100%; height: 50vh; min-height: 320px; overflow: hidden; }
.page-hero img { width: 100%; height: 100%; object-fit: cover; transform: scale(1.03); animation: heroZoom 8s ease-in-out infinite alternate; }
@keyframes heroZoom { 0% { transform: scale(1.03); } 100% { transform: scale(1.08); } }
.page-hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(10,22,40,0.3) 0%, rgba(10,22,40,0.15) 40%, rgba(10,22,40,0.7) 80%, rgba(10,22,40,1) 100%); z-index: 2; }
.page-hero-title { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); text-align: center; z-index: 3; }
.page-hero-title h1 { font-size: clamp(1.5rem,4vw,2.5rem); font-weight: 700; letter-spacing: 0.15em; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.5); }
.page-hero-title h1 span { display: inline-block; border-bottom: 2px solid rgba(0,168,255,0.7); padding-bottom: 10px; }
.page-hero-title .page-hero-en { font-size: 0.85rem; color: #00a8ff; letter-spacing: 0.2em; margin-top: 12px; font-weight: 400; }

.content-section { padding: 80px 0; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* RECRUIT CONTENT */
.recruit-box {
  max-width: 800px; margin: 0 auto; text-align: center;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px; padding: 60px 50px;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.recruit-box h2 {
  font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 12px; letter-spacing: 0.08em;
}
.recruit-box .recruit-sub {
  font-size: 0.85rem; color: #00a8ff; letter-spacing: 0.15em; margin-bottom: 40px;
}
.recruit-box p {
  font-size: 1rem; color: #a0b0c8; line-height: 2.2; margin-bottom: 30px;
}
.recruit-tel {
  display: inline-block; font-size: 1.6rem; font-weight: 700; color: #00a8ff; letter-spacing: 0.08em;
  padding: 16px 40px; border: 2px solid rgba(0,168,255,0.3); border-radius: 12px;
  background: rgba(0,168,255,0.05); transition: background 0.3s ease, box-shadow 0.3s ease;
}
.recruit-tel:hover {
  background: rgba(0,168,255,0.1); box-shadow: 0 8px 30px rgba(0,168,255,0.2);
}
.recruit-tel small { display: block; font-size: 0.75rem; font-weight: 400; color: #8a9bb5; margin-top: 4px; }

.footer { background: #060e1a; border-top: 1px solid rgba(255,255,255,0.05); padding: 60px 0 30px; }
.footer-inner { display: flex; flex-direction: column; align-items: center; gap: 24px; }
.footer-logo img { height: 40px; width: auto; opacity: 0.85; transition: opacity 0.3s ease; }
.footer-logo:hover img { opacity: 1; }
.footer-address { text-align: center; font-size: 0.85rem; color: #6a7d96; letter-spacing: 0.05em; line-height: 2; }
.footer-twitter { display: inline-block; transition: transform 0.3s ease, opacity 0.3s ease; }
.footer-twitter img { width: 30px; height: 30px; }
.footer-twitter:hover { transform: scale(1.15); opacity: 0.8; }
.footer-copyright { font-size: 0.75rem; color: #3a4d66; letter-spacing: 0.08em; margin-top: 20px; text-align: center; }
.back-to-top { display: inline-block; margin-top: 24px; padding: 10px 28px; font-size: 0.85rem; color: #00a8ff; border: 1px solid rgba(0,168,255,0.3); border-radius: 30px; transition: background 0.3s ease, color 0.3s ease; letter-spacing: 0.08em; }
.back-to-top:hover { background: #00a8ff; color: #0a1628; }

.fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.22,1,0.36,1); }
.fade-in.visible { opacity: 1; transform: translateY(0); }

@media (max-width: 1024px) { .header { padding: 0 24px; } }
@media (max-width: 768px) {
  .hamburger { display: flex; } .header-twitter { display: none; }
  .header { padding: 0 16px; height: 64px; } .header-logo img { height: 36px; }
  .page-hero { min-height: 260px; height: 40vh; } .content-section { padding: 50px 0; }
  .recruit-box { padding: 40px 24px; }
}
@media (max-width: 480px) { .container { padding: 0 16px; } .recruit-tel { font-size: 1.3rem; padding: 14px 28px; } .footer-address { font-size: 0.8rem; } }
</style>
</head>

<script>
(function(){var h=document.getElementById('header');window.addEventListener('scroll',function(){h.classList.toggle('scrolled',window.scrollY>80)},{passive:true})})();
(function(){var b=document.getElementById('hamburger'),n=document.getElementById('mobileNav'),o=document.getElementById('mobileOverlay');function t(){b.classList.toggle('active');n.classList.toggle('open');o.classList.toggle('show');document.body.style.overflow=n.classList.contains('open')?'hidden':''}function c(){b.classList.remove('active');n.classList.remove('open');o.classList.remove('show');document.body.style.overflow=''}b.addEventListener('click',t);o.addEventListener('click',c);n.querySelectorAll('a').forEach(function(l){l.addEventListener('click',c)})})();
(function(){var els=document.querySelectorAll('.fade-in');if(!els.length)return;var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})},{threshold:0.15,rootMargin:'0px 0px -40px 0px'});els.forEach(function(el){obs.observe(el)})})();
</script>
