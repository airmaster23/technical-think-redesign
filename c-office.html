<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Noto Sans JP', sans-serif; background: #0d0d0d; color: #e0e0e0; overflow-x: hidden; line-height: 1.8; letter-spacing: 0.05em; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; height: auto; display: block; }
ul { list-style: none; }
body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px); pointer-events: none; z-index: 9999; }
.particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.particle { position: absolute; width: 3px; height: 3px; background: #00e5ff; border-radius: 50%; opacity: 0; animation: particleFloat linear infinite; }
.particle:nth-child(1)  { left: 5%;  animation-duration: 18s; animation-delay: 0s; }
.particle:nth-child(2)  { left: 15%; animation-duration: 22s; animation-delay: 2s; }
.particle:nth-child(3)  { left: 25%; animation-duration: 16s; animation-delay: 4s; }
.particle:nth-child(4)  { left: 35%; animation-duration: 25s; animation-delay: 1s; }
.particle:nth-child(5)  { left: 45%; animation-duration: 20s; animation-delay: 3s; }
.particle:nth-child(6)  { left: 55%; animation-duration: 17s; animation-delay: 5s; }
.particle:nth-child(7)  { left: 65%; animation-duration: 23s; animation-delay: 0.5s; }
.particle:nth-child(8)  { left: 75%; animation-duration: 19s; animation-delay: 2.5s; }
.particle:nth-child(9)  { left: 85%; animation-duration: 21s; animation-delay: 4.5s; }
.particle:nth-child(10) { left: 95%; animation-duration: 15s; animation-delay: 1.5s; }
@keyframes particleFloat { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 0.6; } 50% { opacity: 0.3; } 90% { opacity: 0.5; } 100% { transform: translateY(-10vh) scale(1.2); opacity: 0; } }

.site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(13,13,13,0.92); backdrop-filter: blur(12px); border-bottom: 2px solid transparent; transition: border-color 0.3s; padding: 0 24px; height: 70px; display: flex; align-items: center; justify-content: space-between; }
.site-header.scrolled { border-bottom-color: #00e5ff; box-shadow: 0 2px 20px rgba(0,229,255,0.15); }
.header-logo img { height: 40px; width: auto; }
.header-right { display: flex; align-items: center; gap: 16px; }
.header-twitter img { width: 28px; height: 28px; filter: brightness(0) invert(1); transition: filter 0.3s; }
.header-twitter:hover img { filter: brightness(0) invert(1) drop-shadow(0 0 6px #00e5ff); }
.hamburger { display: none; flex-direction: column; justify-content: center; align-items: center; width: 36px; height: 36px; cursor: pointer; gap: 6px; z-index: 1100; background: none; border: none; }
.hamburger span { display: block; width: 26px; height: 2px; background: #00e5ff; transition: all 0.3s; border-radius: 2px; }
.hamburger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
.hamburger.active span:nth-child(2) { opacity: 0; }
.hamburger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
.slide-menu { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: rgba(13,13,13,0.97); backdrop-filter: blur(20px); z-index: 1050; padding: 90px 30px 40px; transition: right 0.4s; border-left: 2px solid #00e5ff; overflow-y: auto; }
.slide-menu.open { right: 0; }
.slide-menu a { display: block; padding: 14px 0; font-size: 15px; font-weight: 500; letter-spacing: 0.08em; border-bottom: 1px solid rgba(0,229,255,0.12); transition: color 0.3s, padding-left 0.3s; }
.slide-menu a:hover { color: #00e5ff; padding-left: 10px; }
.menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1040; }
.menu-overlay.active { display: block; }

.page-hero { position: relative; width: 100%; height: 45vh; min-height: 300px; overflow: hidden; margin-top: 70px; clip-path: polygon(0 0, 100% 0, 100% 88%, 0 100%); }
.page-hero img { width: 100%; height: 100%; object-fit: cover; animation: kenBurns 18s ease-in-out infinite alternate; }
@keyframes kenBurns { 0% { transform: scale(1) translate(0,0); } 50% { transform: scale(1.08) translate(-1%,-1%); } 100% { transform: scale(1.04) translate(1%,0.5%); } }
.page-hero::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px); pointer-events: none; z-index: 3; }
.hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.6) 100%); z-index: 2; }
.hero-title { position: absolute; bottom: 15%; left: 6%; z-index: 4; font-size: clamp(28px,5vw,52px); font-weight: 900; color: #fff; letter-spacing: 0.12em; text-shadow: 0 0 10px rgba(0,229,255,0.8), 0 0 30px rgba(0,229,255,0.5), 0 0 60px rgba(0,229,255,0.3); animation: glowPulse 3s ease-in-out infinite alternate; }
.hero-title span { display: block; font-size: 14px; font-weight: 400; letter-spacing: 0.2em; color: rgba(255,255,255,0.6); margin-top: 8px; }
@keyframes glowPulse { 0% { text-shadow: 0 0 10px rgba(0,229,255,0.8), 0 0 30px rgba(0,229,255,0.5), 0 0 60px rgba(0,229,255,0.3); } 100% { text-shadow: 0 0 15px rgba(0,229,255,1), 0 0 40px rgba(0,229,255,0.7), 0 0 80px rgba(0,229,255,0.4); } }
.skew-divider { position: relative; height: 60px; z-index: 1; margin-top: -30px; }
.skew-divider::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0d0d0d; transform: skewY(-2.5deg); transform-origin: top left; }

.main-content { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 40px 24px 80px; display: flex; gap: 40px; }
.content-area { flex: 1; min-width: 0; }
.sidebar { width: 260px; flex-shrink: 0; }
.sidebar-nav { background: rgba(20,20,20,0.8); border: 1px solid rgba(0,229,255,0.15); border-radius: 8px; padding: 24px; position: sticky; top: 90px; }
.sidebar-nav h3 { font-size: 14px; font-weight: 700; color: #00e5ff; letter-spacing: 0.1em; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid rgba(0,229,255,0.3); }
.sidebar-nav a { display: block; padding: 10px 0; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.06); transition: color 0.3s, padding-left 0.3s; }
.sidebar-nav a:hover, .sidebar-nav a.active { color: #00e5ff; padding-left: 8px; }
.sidebar-nav a.active { font-weight: 700; }
.breadcrumb { margin-bottom: 32px; font-size: 13px; color: rgba(255,255,255,0.4); }
.breadcrumb a:hover { color: #00e5ff; }
.section-title { font-size: clamp(22px,3vw,32px); font-weight: 900; color: #fff; margin-bottom: 40px; padding-bottom: 16px; border-bottom: 3px solid #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.3); }

/* Gallery grid */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.gallery-item {
  position: relative; overflow: hidden; border-radius: 6px;
  border: 1px solid rgba(0,229,255,0.1);
  aspect-ratio: 4/3;
  transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
}
.gallery-item:hover {
  border-color: #00e5ff;
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 8px 30px rgba(0,229,255,0.15);
  z-index: 2;
}
.gallery-item img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.5s;
}
.gallery-item:hover img { transform: scale(1.1); }
.gallery-item::after {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(to top, rgba(0,229,255,0.15) 0%, transparent 50%);
  opacity: 0; transition: opacity 0.3s;
}
.gallery-item:hover::after { opacity: 1; }

/* Lightbox */
.lightbox {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.92); z-index: 10000;
  justify-content: center; align-items: center; cursor: pointer;
}
.lightbox.active { display: flex; }
.lightbox img { max-width: 90%; max-height: 90vh; border: 2px solid rgba(0,229,255,0.3); border-radius: 4px; }

.site-footer { position: relative; z-index: 1; background: #0a0a0a; background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px); background-size: 40px 40px; padding: 60px 24px 30px; margin-top: 80px; border-top: 2px solid rgba(0,229,255,0.2); }
.footer-inner { max-width: 1000px; margin: 0 auto; text-align: center; }
.footer-logo { margin: 0 auto 20px; }
.footer-logo img { height: 36px; margin: 0 auto; }
.footer-address { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.8; margin-bottom: 16px; }
.footer-twitter { display: inline-block; margin-bottom: 20px; }
.footer-twitter img { width: 24px; height: 24px; filter: brightness(0) invert(1); opacity: 0.5; transition: opacity 0.3s; }
.footer-twitter:hover img { opacity: 1; }
.footer-copy { font-size: 11px; color: rgba(255,255,255,0.3); }
.back-to-top { display: inline-block; margin-top: 20px; font-size: 13px; color: #00e5ff; letter-spacing: 0.1em; transition: opacity 0.3s; }
.back-to-top:hover { opacity: 0.7; }

@media (max-width: 900px) {
  .main-content { flex-direction: column; }
  .sidebar { width: 100%; order: -1; }
  .sidebar-nav { position: static; }
}
@media (max-width: 768px) {
  .hamburger { display: flex; }
  .page-hero { height: 35vh; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: 1fr; }
}
</style>

<script>
const header = document.getElementById('header');
window.addEventListener('scroll', () => { header.classList.toggle('scrolled', window.scrollY > 50); });
const hamburger = document.getElementById('hamburger');
const slideMenu = document.getElementById('slideMenu');
const menuOverlay = document.getElementById('menuOverlay');
function toggleMenu() { hamburger.classList.toggle('active'); slideMenu.classList.toggle('open'); menuOverlay.classList.toggle('active'); }
hamburger.addEventListener('click', toggleMenu);
menuOverlay.addEventListener('click', toggleMenu);

function openLightbox(el) {
  const src = el.querySelector('img').src;
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
</script>
